<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>natalyx — Репетитор</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        :root {
            --bg-primary: #0b0b20;
            --bg-secondary: #111130;
            --bg-card: #16163a;
            --bg-card-hover: #1c1c48;
            --accent: #7c5cfc;
            --accent-light: #9b83ff;
            --accent-glow: rgba(124, 92, 252, 0.25);
            --green: #34c97c;
            --green-bg: rgba(52, 201, 124, 0.12);
            --orange: #f59e4b;
            --orange-bg: rgba(245, 158, 75, 0.12);
            --blue-info: #5b9cf5;
            --blue-info-bg: rgba(91, 156, 245, 0.12);
            --text-primary: #f0edff;
            --text-secondary: #a5a0c8;
            --text-muted: #6e6a8a;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-card: rgba(255, 255, 255, 0.08);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 1px rgba(255, 255, 255, 0.04) inset;
            --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.45);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'San Francisco', 'Helvetica Neue',
                Roboto, 'Segoe UI', system-ui, sans-serif;
            --transition-fast: 0.15s ease-out;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-system);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            padding-bottom: var(--safe-bottom);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(124, 92, 252, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 20%, rgba(91, 156, 245, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 15% 70%, rgba(124, 92, 252, 0.03) 0%, transparent 50%);
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 16px 14px 24px;
            gap: 16px;
            position: relative;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 4px 2px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #7c5cfc 0%, #5b3ce8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: -0.5px;
            box-shadow: 0 4px 14px rgba(124, 92, 252, 0.4);
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }
        .balance-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .balance-amount {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
            background: var(--bg-card);
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid var(--border-card);
            white-space: nowrap;
            box-shadow: var(--shadow-card);
        }
        .balance-amount .currency {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 2px;
        }
        .btn-add {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(124, 92, 252, 0.45);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast),
                background var(--transition-fast);
            flex-shrink: 0;
            line-height: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(124, 92, 252, 0.6);
            background: #6b4ae8;
        }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .summary-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 14px 10px;
            text-align: center;
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-card);
            transition: transform var(--transition-fast), border-color var(--transition-fast);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .summary-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            border-radius: 0 0 6px 6px;
        }
        .summary-card.card-income::after {
            background: var(--green);
        }
        .summary-card.card-unpaid::after {
            background: var(--orange);
        }
        .summary-card.card-lessons::after {
            background: var(--blue-info);
        }
        .summary-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
            display: block;
        }
        .summary-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 3px;
        }
        .summary-value {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: #fff;
            white-space: nowrap;
        }
        .summary-value.income-val {
            color: var(--green);
        }
        .summary-value.unpaid-val {
            color: var(--orange);
        }
        .summary-value.lessons-val {
            color: var(--blue-info);
        }

        /* ── month calendar ── */
        .calendar-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }
        .calendar-month-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.2px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            transition: background var(--transition-fast);
        }
        .calendar-month-title:active {
            background: var(--bg-card-hover);
        }
        .calendar-nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border-card);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            line-height: 0;
            padding: 0;
        }
        .calendar-nav-btn:active {
            background: var(--bg-card-hover);
            color: #fff;
            transform: scale(0.92);
        }
        .calendar-grid-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 2px 2px 4px;
            letter-spacing: 0.3px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            color: #d0d0e0;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            background: transparent;
            border: 1px solid transparent;
        }
        .calendar-day:active {
            transform: scale(0.9);
        }
        .calendar-day.other-month {
            color: #4a4768;
            pointer-events: none;
            opacity: 0.4;
        }
        .calendar-day.today {
            border: 1px solid var(--accent-light);
            color: #fff;
            font-weight: 700;
            background: rgba(124, 92, 252, 0.15);
        }
        .calendar-day.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent-light);
            box-shadow: 0 4px 14px var(--accent-glow);
            font-weight: 700;
            transform: none;
        }
        .calendar-day .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-light);
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
        }
        .calendar-day.selected .dot {
            background: #fff;
        }
        .calendar-day.today .dot {
            background: var(--accent-light);
        }

        .lessons-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }
        .lessons-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lessons-count-badge {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-card);
        }
        .lessons-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .lesson-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-card);
            transition: all var(--transition-smooth);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .lesson-card:active {
            transform: scale(0.985);
            background: var(--bg-card-hover);
        }
        .lesson-card.paid {
            border-left: 3px solid var(--green);
        }
        .lesson-card.unpaid {
            border-left: 3px solid var(--orange);
        }
        .lesson-time-block {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 56px;
        }
        .lesson-time {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: #fff;
        }
        .lesson-duration {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .lesson-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .lesson-student {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lesson-subject {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .lesson-price {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .lesson-status {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .payment-checkbox {
            position: relative;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .payment-checkbox input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        .checkmark {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: transparent;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkmark::after {
            content: '';
            width: 10px;
            height: 6px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .payment-checkbox input:checked+.checkmark {
            background: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 12px rgba(52, 201, 124, 0.4);
        }
        .payment-checkbox input:checked+.checkmark::after {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        .empty-state .empty-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-sheet {
            width: 100%;
            max-width: 430px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 20px 18px 28px;
            box-shadow: var(--shadow-elevated);
            transform: translateY(100%);
            transition: transform var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }
        .modal-handle {
            width: 36px;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            align-self: center;
            margin-bottom: 4px;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: #fff;
            text-align: center;
        }
        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .modal-field label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .modal-field input {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-card);
            background: var(--bg-card);
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-system);
            outline: none;
            transition: border-color var(--transition-fast);
            -webkit-user-select: text;
            user-select: text;
        }
        .modal-field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .modal-field input::placeholder {
            color: var(--text-muted);
        }
        .modal-field input[type="date"] {
            color-scheme: dark;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
        }
        .modal-field input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
            cursor: pointer;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            flex: 1;
            padding: 13px 16px;
            border-radius: 30px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-system);
            letter-spacing: -0.2px;
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 92, 252, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-card);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--bg-card);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 200;
            pointer-events: none;
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-elevated);
            transition: transform var(--transition-smooth);
            white-space: nowrap;
        }
        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 360px) {
            .summary-row {
                gap: 6px;
            }
            .summary-card {
                padding: 10px 6px;
            }
            .summary-value {
                font-size: 1rem;
            }
            .calendar-day {
                font-size: 0.75rem;
            }
        }
        @media (min-width: 431px) {
            .app-container {
                border-left: 1px solid var(--border-subtle);
                border-right: 1px solid var(--border-subtle);
                box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
            }
            body {
                align-items: center;
                padding: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-brand">
                <div class="header-logo">NX</div>
                <span class="header-title">natalyx</span>
            </div>
            <div class="balance-block">
                <span class="balance-amount" id="headerBalance">0<span class="currency">₴</span></span>
                <button class="btn-add" id="btnAddLesson" aria-label="Додати заняття">+</button>
            </div>
        </header>

        <div class="summary-row">
            <div class="summary-card card-income">
                <span class="summary-icon">💰</span>
                <span class="summary-label">Надходження</span>
                <span class="summary-value income-val" id="summaryIncome">0 ₴</span>
            </div>
            <div class="summary-card card-unpaid">
                <span class="summary-icon">⚠️</span>
                <span class="summary-label">Неоплачено</span>
                <span class="summary-value unpaid-val" id="summaryUnpaid">0 ₴</span>
            </div>
            <div class="summary-card card-lessons">
                <span class="summary-icon">📅</span>
                <span class="summary-label">Занять</span>
                <span class="summary-value lessons-val" id="summaryLessons">0</span>
            </div>
        </div>

        <div class="calendar-section">
            <div class="calendar-nav">
                <button class="calendar-nav-btn" id="btnPrevMonth" aria-label="Попередній місяць">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="calendar-month-title" id="calendarMonthTitle"></span>
                <button class="calendar-nav-btn" id="btnNextMonth" aria-label="Наступний місяць">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <div class="calendar-grid-header">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Нд</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="lessons-header">
            <span class="lessons-title">Список занять</span>
            <span class="lessons-count-badge" id="lessonsCountBadge">0 занять</span>
        </div>
        <div class="lessons-list" id="lessonsList"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Нове заняття</h3>
            <div class="modal-field">
                <label for="inputDate">Дата</label>
                <input type="date" id="inputDate" autocomplete="off">
            </div>
            <div class="modal-field">
                <label for="inputStudent">Ім'я учня</label>
                <input type="text" id="inputStudent" placeholder="Наприклад, Марія Коваленко" autocomplete="off">
            </div>
            <div class="modal-field">
                <label for="inputSubject">Предмет</label>
                <input type="text" id="inputSubject" placeholder="Наприклад, Математика" autocomplete="off">
            </div>
            <div class="modal-field">
                <label for="inputTime">Час (години)</label>
                <input type="text" id="inputTime" placeholder="18:00 - 19:00" autocomplete="off">
            </div>
            <div class="modal-field">
                <label for="inputPrice">Вартість (₴)</label>
                <input type="number" id="inputPrice" placeholder="500" min="0" step="50" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btnCancel">Скасувати</button>
                <button class="btn btn-primary" id="btnSave">Додати</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const tg = window.Telegram?.WebApp;
            let hapticAvailable = false;

            function initTelegram() {
                if (tg) {
                    try {
                        tg.ready();
                        tg.expand();
                        if (tg.setHeaderColor) tg.setHeaderColor('#0b0b20');
                        if (tg.setBackgroundColor) tg.setBackgroundColor('#0b0b20');
                        hapticAvailable = !!(tg.HapticFeedback);
                    } catch (e) { /* silent */ }
                }
            }

            function hapticLight() { if (hapticAvailable) try { tg.HapticFeedback.impactOccurred('light'); } catch (
                e) {} }

            function hapticSuccess() { if (hapticAvailable) try { tg.HapticFeedback.notificationOccurred('success'); } catch (
                e) {} }

            function hapticWarning() { if (hapticAvailable) try { tg.HapticFeedback.notificationOccurred('warning'); } catch (
                e) {} }

            const today = new Date();
            const dayMs = 86400000;

            function fmtDate(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day =
                    String(d.getDate()).padStart(2, '0'); return `${y}-${m}-${day}`; }

            function parseDate(str) { const [y, m, d] = str.split('-').map(Number); return new Date(y, m - 1, d); }

            const todayStr = fmtDate(today);

            function dateFromToday(offset) { const d = new Date(today.getTime() + offset * dayMs); return fmtDate(d); }

            let lessons = [
                { id: 1, date: todayStr, time: '16:00 - 17:00', student: 'Олександр Петренко', subject: 'Математика',
                    price: 500, isPaid: true },
                { id: 2, date: todayStr, time: '18:00 - 19:00', student: 'Марія Коваленко', subject: 'Англійська мова',
                    price: 450, isPaid: false },
                { id: 3, date: todayStr, time: '20:00 - 21:00', student: 'Дмитро Шевчук', subject: 'Фізика', price: 600,
                    isPaid: true },
                { id: 4, date: dateFromToday(1), time: '15:00 - 16:00', student: 'Анна Бондар', subject: 'Хімія',
                price: 500, isPaid: false },
                { id: 5, date: dateFromToday(1), time: '17:30 - 18:30', student: 'Ігор Мельник',
                subject: 'Програмування', price: 700, isPaid: false },
                { id: 6, date: dateFromToday(2), time: '10:00 - 11:00', student: 'Софія Лисенко',
                    subject: 'Українська мова', price: 400, isPaid: true },
                { id: 7, date: dateFromToday(3), time: '18:00 - 19:00', student: 'Олександр Петренко',
                    subject: 'Математика', price: 500, isPaid: false },
                { id: 8, date: dateFromToday(-1), time: '16:00 - 17:00', student: 'Катерина Романюк', subject: 'Біологія',
                    price: 450, isPaid: true },
                { id: 9, date: dateFromToday(-1), time: '19:00 - 20:00', student: 'Марія Коваленко',
                    subject: 'Англійська мова', price: 450, isPaid: true },
                { id: 10, date: dateFromToday(4), time: '14:00 - 15:00', student: 'Дмитро Шевчук', subject: 'Фізика',
                    price: 600, isPaid: false },
            ];

            let nextId = lessons.length + 1;
            let selectedDate = todayStr;

            const $headerBalance = document.getElementById('headerBalance');
            const $summaryIncome = document.getElementById('summaryIncome');
            const $summaryUnpaid = document.getElementById('summaryUnpaid');
            const $summaryLessons = document.getElementById('summaryLessons');
            const $calendarGrid = document.getElementById('calendarGrid');
            const $calendarMonthTitle = document.getElementById('calendarMonthTitle');
            const $btnPrevMonth = document.getElementById('btnPrevMonth');
            const $btnNextMonth = document.getElementById('btnNextMonth');
            const $lessonsList = document.getElementById('lessonsList');
            const $lessonsCountBadge = document.getElementById('lessonsCountBadge');
            const $btnAdd = document.getElementById('btnAddLesson');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $btnCancel = document.getElementById('btnCancel');
            const $btnSave = document.getElementById('btnSave');
            const $inputDate = document.getElementById('inputDate');
            const $inputStudent = document.getElementById('inputStudent');
            const $inputSubject = document.getElementById('inputSubject');
            const $inputTime = document.getElementById('inputTime');
            const $inputPrice = document.getElementById('inputPrice');
            const $toast = document.getElementById('toast');

            let toastTimer;

            function showToast(message) {
                clearTimeout(toastTimer);
                $toast.textContent = message;
                $toast.classList.add('visible');
                toastTimer = setTimeout(() => $toast.classList.remove('visible'), 1800);
            }

            function getFilteredLessons() { return lessons.filter(l => l.date === selectedDate); }

            function computeSummaries() {
                const allPaid = lessons.filter(l => l.isPaid);
                const allUnpaid = lessons.filter(l => !l.isPaid);
                return { income: allPaid.reduce((s, l) => s + l.price, 0), unpaid: allUnpaid.reduce((s, l) => s + l
                        .price, 0), totalLessons: lessons.length };
            }

            function updateSummaries() {
                const { income, unpaid, totalLessons } = computeSummaries();
                $headerBalance.innerHTML = `${income.toLocaleString('uk-UA')}<span class="currency">₴</span>`;
                $summaryIncome.textContent = `${income.toLocaleString('uk-UA')} ₴`;
                $summaryUnpaid.textContent = `${unpaid.toLocaleString('uk-UA')} ₴`;
                $summaryLessons.textContent = totalLessons;
                updateCountBadge();
            }

            function updateCountBadge() {
                const filtered = getFilteredLessons();
                const count = filtered.length;
                const word = count === 1 ? 'заняття' : (count >= 2 && count <= 4 ? 'заняття' : 'занять');
                $lessonsCountBadge.textContent = `${count} ${word}`;
            }

            function escapeHTML(str) { const div = document.createElement('div');
                div.textContent = str; return div.innerHTML; }

            function renderLessons() {
                const filtered = getFilteredLessons();
                $lessonsList.innerHTML = '';
                if (filtered.length === 0) {
                    $lessonsList.innerHTML =
                        `<div class="empty-state"><span class="empty-icon">📭</span><span class="empty-text">На цю дату занять немає</span></div>`;
                    return;
                }
                filtered.sort((a, b) => a.time.localeCompare(b.time));
                filtered.forEach(lesson => {
                    const card = document.createElement('div');
                    card.className = `lesson-card ${lesson.isPaid ? 'paid' : 'unpaid'}`;
                    card.dataset.id = lesson.id;
                    card.innerHTML = `
                        <div class="lesson-time-block">
                            <span class="lesson-time">${escapeHTML(lesson.time.split(' - ')[0])}</span>
                            <span class="lesson-duration">${escapeHTML(lesson.time)}</span>
                        </div>
                        <div class="lesson-info">
                            <span class="lesson-student">${escapeHTML(lesson.student)}</span>
                            <span class="lesson-subject">${escapeHTML(lesson.subject)}</span>
                            <span class="lesson-price">${lesson.price} ₴</span>
                        </div>
                        <div class="lesson-status">
                            <label class="payment-checkbox" aria-label="Статус оплати">
                                <input type="checkbox" ${lesson.isPaid ? 'checked' : ''} data-id="${lesson.id}">
                                <span class="checkmark"></span>
                            </label>
                        </div>`;
                    const checkbox = card.querySelector('input[type="checkbox"]');
                    checkbox.addEventListener('change', (e) => {
                        e.stopPropagation();
                        const id = parseInt(checkbox.dataset.id);
                        const obj = lessons.find(l => l.id === id);
                        if (obj) {
                            obj.isPaid = checkbox.checked;
                            obj.isPaid ? (hapticSuccess(), showToast('✅ Оплачено!')) : (
                                hapticWarning(), showToast('⚠️ Позначено неоплаченим'));
                            renderLessons();
                            renderCalendar();
                            updateSummaries();
                        }
                    });
                    card.addEventListener('click', (e) => {
                        if (e.target.tagName === 'INPUT' || e.target.classList.contains('checkmark'))
                            return;
                        hapticLight();
                        const id = parseInt(card.dataset.id);
                        const obj = lessons.find(l => l.id === id);
                        if (obj) {
                            obj.isPaid = !obj.isPaid;
                            obj.isPaid ? (hapticSuccess(), showToast('✅ Оплачено!')) : (
                                hapticWarning(), showToast('⚠️ Позначено неоплаченим'));
                            renderLessons();
                            renderCalendar();
                            updateSummaries();
                        }
                    });
                    $lessonsList.appendChild(card);
                });
            }

            // ── month calendar state ──
            let calendarYear = today.getFullYear();
            let calendarMonth = today.getMonth(); // 0-11

            const monthNames = ['Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень',
                'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'
            ];

            function getDaysWithLessons() {
                const set = new Set();
                lessons.forEach(l => set.add(l.date));
                return set;
            }

            function renderCalendar() {
                $calendarMonthTitle.textContent = `${monthNames[calendarMonth]} ${calendarYear}`;
                const firstDay = new Date(calendarYear, calendarMonth, 1);
                const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
                const daysInMonth = lastDay.getDate();
                let startDow = firstDay.getDay();
                startDow = startDow === 0 ? 6 : startDow - 1;
                const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
                const lessonDates = getDaysWithLessons();
                $calendarGrid.innerHTML = '';
                for (let i = 0; i < totalCells; i++) {
                    const dayNum = i - startDow + 1;
                    const isCurrentMonth = dayNum >= 1 && dayNum <= daysInMonth;
                    const cellDate = isCurrentMonth ? new Date(calendarYear, calendarMonth, dayNum) : null;
                    const dateStr = cellDate ? fmtDate(cellDate) : '';
                    const cell = document.createElement('div');
                    cell.className = 'calendar-day';
                    if (!isCurrentMonth) cell.classList.add('other-month');
                    if (dateStr === todayStr) cell.classList.add('today');
                    if (dateStr === selectedDate && isCurrentMonth) cell.classList.add('selected');
                    cell.textContent = isCurrentMonth ? dayNum : '';
                    if (isCurrentMonth && lessonDates.has(dateStr)) {
                        const dot = document.createElement('span');
                        dot.className = 'dot';
                        cell.appendChild(dot);
                    }
                    if (isCurrentMonth) {
                        cell.addEventListener('click', () => {
                            hapticLight();
                            selectedDate = dateStr;
                            renderCalendar();
                            renderLessons();
                            updateCountBadge();
                        });
                    }
                    $calendarGrid.appendChild(cell);
                }
            }

            function goToPrevMonth() {
                hapticLight();
                if (calendarMonth === 0) { calendarMonth = 11;
                    calendarYear--; } else calendarMonth--;
                renderCalendar();
            }

            function goToNextMonth() {
                hapticLight();
                if (calendarMonth === 11) { calendarMonth = 0;
                    calendarYear++; } else calendarMonth++;
                renderCalendar();
            }

            function goToToday() {
                hapticLight();
                calendarYear = today.getFullYear();
                calendarMonth = today.getMonth();
                selectedDate = todayStr;
                renderCalendar();
                renderLessons();
                updateCountBadge();
            }

            $btnPrevMonth.addEventListener('click', goToPrevMonth);
            $btnNextMonth.addEventListener('click', goToNextMonth);
            $calendarMonthTitle.addEventListener('click', goToToday);

            // ── modal ──
            function openModal() {
                hapticLight();
                $modalOverlay.classList.add('active');
                $inputDate.value = selectedDate;
                $inputStudent.value = '';
                $inputSubject.value = '';
                $inputTime.value = '';
                $inputPrice.value = '';
                setTimeout(() => $inputStudent.focus(), 300);
            }

            function closeModal() {
                hapticLight();
                $modalOverlay.classList.remove('active');
                $inputDate.value = '';
                $inputStudent.value = '';
                $inputSubject.value = '';
                $inputTime.value = '';
                $inputPrice.value = '';
            }

            function saveNewLesson() {
                const dateVal = $inputDate.value.trim();
                const student = $inputStudent.value.trim();
                const subject = $inputSubject.value.trim();
                const time = $inputTime.value.trim();
                const priceStr = $inputPrice.value.trim();
                if (!dateVal) { showToast('⚠️ Вкажіть дату');
                    hapticWarning();
                    $inputDate.focus(); return; }
                if (!student) { showToast('⚠️ Вкажіть ім\'я учня');
                    hapticWarning();
                    $inputStudent.focus(); return; }
                if (!subject) { showToast('⚠️ Вкажіть предмет');
                    hapticWarning();
                    $inputSubject.focus(); return; }
                if (!time || !time.includes('-')) { showToast('⚠️ Вкажіть час (напр. 18:00 - 19:00)');
                    hapticWarning();
                    $inputTime.focus(); return; }
                const price = parseInt(priceStr);
                if (isNaN(price) || price <= 0) { showToast('⚠️ Вкажіть коректну вартість');
                    hapticWarning();
                    $inputPrice.focus(); return; }
                const newLesson = { id: nextId++, date: dateVal, time, student, subject, price, isPaid: false };
                lessons.unshift(newLesson);
                hapticSuccess();
                showToast('✅ Заняття додано!');
                closeModal();
                const d = parseDate(dateVal);
                calendarYear = d.getFullYear();
                calendarMonth = d.getMonth();
                selectedDate = dateVal;
                renderCalendar();
                renderLessons();
                updateSummaries();
            }

            $btnAdd.addEventListener('click', openModal);
            $btnCancel.addEventListener('click', closeModal);
            $btnSave.addEventListener('click', saveNewLesson);
            $modalOverlay.addEventListener('click', (e) => { if (e.target === $modalOverlay) closeModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $modalOverlay.classList.contains(
                    'active')) closeModal(); });
            $inputPrice.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveNewLesson(); });

            function init() {
                initTelegram();
                renderCalendar();
                renderLessons();
                updateSummaries();
                console.log('🚀 natalyx TMA initialized');
            }
            init();
        })();
    </script>
</body>
</html>
